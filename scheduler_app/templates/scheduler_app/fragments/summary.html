<div class="metric-grid">
  <div class="metric"><span>Total Runs</span><strong>{{ summary.total_runs }}</strong></div>
  <div class="metric"><span>Succeeded</span><strong>{{ summary.success_count }}</strong></div>
  <div class="metric"><span>Failed</span><strong>{{ summary.failure_count }}</strong></div>
  <div class="metric"><span>Timed Out</span><strong>{{ summary.timeout_count }}</strong></div>
  <div class="metric"><span>Misfires</span><strong>{{ summary.misfire_count }}</strong></div>
  <div class="metric"><span>Last Status</span><strong>{{ summary.last_status }}</strong></div>
</div>
